name: Build Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      target_devices:
        description: 'target device (目标设备)'
        required: true
        type: choice
        default: 'munch'
        options:
          - 'umi'
          - 'cmi'
          - 'cas'
          - 'thyme'
          - 'munch'
          - 'dagu'
          - 'elish'
          - 'enuma'
          - 'alioth'
          - 'apollo'
          - 'lmi'
          - 'psyche'
          - 'pipa'
          - 'all'
      compiled_system:
        description: 'Applicable systems (适用系统)'
        required: true
        type: choice
        default: 'MIUI'
        options:
          - 'MIUI'
          - 'AOSP'
      kernelsu_variant:
        description: 'KernelSU variants (KernelSU 版本)'
        required: true
        type: choice
        default: 'SukiSU-Ultra'
        options:
          - 'SukiSU-Ultra'
          - 'RKSU'
          - 'KernelSU'
          - 'None'
      kpm_enable:
        description: 'Is KPM support enabled? (是否启用 KPM 支持?)'
        required: true
        type: choice
        default: 'enable'
        options:
          - 'enable'
          - 'disable'
      droidspaces_enable:
        description: 'Droidspaces / LXC / Docker support (启用容器支持)'
        required: true
        type: choice
        default: 'enable'
        options:
          - 'enable'
          - 'disable'
      kernel_version:
        description: 'Customizing the kernel version number (自定义内核版本号)'
        required: false
        type: string
        default: ''
      build_type:
        description: 'Kernel Build Type (内核构建类型)'
        required: true
        type: choice
        default: 'Release'
        options:
          - 'Release'
          - 'Dev'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          DEVICES="${{ github.event.inputs.target_devices }}"
          if [ "$DEVICES" == "all" ]; then
            DEVICES="umi,cmi,cas,thyme,munch,dagu,elish,enuma,alioth,apollo,lmi,psyche,pipa"
          fi
          DEVICES_JSON="[$(echo $DEVICES | sed 's/,/","/g' | sed 's/.*/"&"/')]"
          echo "matrix={\"device\":$DEVICES_JSON}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      actions: write
    strategy:
      matrix: ${{fromJson(needs.prepare.outputs.matrix)}}
      fail-fast: false
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      WORKDIR: "${{ github.workspace }}"
      KERNEL_SOURCE: "${{ github.workspace }}/kernel_source"
      TOOLCHAIN_DIR: "${{ github.workspace }}/toolchain"
      DEVICE: "${{ matrix.device }}"

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📢 Build Information (构建信息)
        run: |
          echo "设备: ${DEVICE} | 系统: ${{ github.event.inputs.compiled_system }}"
          echo "KernelSU变体: ${{ github.event.inputs.kernelsu_variant }} | KPM: ${{ github.event.inputs.kpm_enable }}"
          echo "Droidspaces: ${{ github.event.inputs.droidspaces_enable }} | 构建类型: ${{ github.event.inputs.build_type }}"

      - name: 🚀 Maximize build space (最大化构建空间)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: 📦 Installation of dependencies (安装依赖)
        run: |
          echo "正在安装构建依赖..."
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y \
            bc binutils-dev bison build-essential ca-certificates ccache cmake curl file flex \
            git libelf-dev libssl-dev make ninja-build python3-dev texinfo u-boot-tools xz-utils \
            zlib1g-dev libncurses-dev wget zip cpio python3 python3-pip tree gcc clang lld llvm jq
          echo "✅ Dependency installation complete (依赖安装完成)"

      - name: ⚙️ Configuring ccache (配置 ccache)
        run: |
          mkdir -p ~/.cache
          ccache --version
          ccache --max-size=4G
          ccache --set-config=compression=true
          ccache --zero-stats
          echo "CCACHE_DIR=$HOME/.cache" >> $GITHUB_ENV

      - name: 📥 Restore ccache (恢复 ccache 缓存)
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: ccache-${{ github.event.inputs.compiled_system }}-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ccache-${{ github.event.inputs.compiled_system }}-
            ccache-

      # ── 克隆内核源码（必须指定 android14-lineage22-mod 分支）──
      - name: 📥 Cloning kernel source code (克隆内核源码)
        run: |
          echo "正在克隆内核源码 (android14-lineage22-mod)..."
          git clone https://github.com/yspbwx2010/kernel_xiaomi_sm8250_mod.git \
            --depth=1 -b android14-lineage22-mod $KERNEL_SOURCE
          echo "✅ Kernel source code cloning complete (内核源码克隆完成)"
          ls -la $KERNEL_SOURCE/arch/arm64/configs/${DEVICE}_defconfig

      - name: 📥 Caching toolchain (缓存工具链)
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: toolchain-clang-r547379-gcc
          restore-keys: |
            toolchain-clang-r547379-gcc-
            toolchain-

      - name: 📥 Download the compilation toolchain (下载编译工具链)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          echo "正在下载编译工具链..."
          mkdir -p "$TOOLCHAIN_DIR/clang"
          mkdir -p "$TOOLCHAIN_DIR/gcc/gcc64"
          mkdir -p "$TOOLCHAIN_DIR/gcc/gcc32"

          echo "正在下载 Clang..."
          cd "$TOOLCHAIN_DIR/clang"
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz -O clang-r547379.tar.gz
          tar -xzf clang-r547379.tar.gz
          rm clang-r547379.tar.gz

          echo "正在下载 GCC 64位工具链..."
          cd "$TOOLCHAIN_DIR/gcc/gcc64"
          git init
          git remote add origin https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git
          git fetch --depth 1 origin
          git checkout FETCH_HEAD

          echo "正在下载 GCC 32位工具链..."
          cd "$TOOLCHAIN_DIR/gcc/gcc32"
          git init
          git remote add origin https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git
          git fetch --depth 1 origin
          git checkout FETCH_HEAD

          echo "✅ Toolchain download complete (工具链下载完成)"

      # ── KernelSU 配置 ──
      # ⚠️ 已验证的兼容分支：
      #   SukiSU-Ultra: main (susfs-dev 已失效 → 404)
      #   RKSU:         susfs-rksu-master (susfs-v1.5.5 已失效 → 404)
      #   KernelSU:     v0.9.5 (来自 tiann/KernelSU main)
      - name: ⚙️ Configuring KernelSU (配置 KernelSU)
        run: |
          cd "$KERNEL_SOURCE"

          KSU_VARIANT="${{ github.event.inputs.kernelsu_variant }}"

          echo "⚙️ Configure KernelSU Variants: $KSU_VARIANT (配置 KernelSU 变体: $KSU_VARIANT)"

          if [ "$KSU_VARIANT" == "SukiSU-Ultra" ]; then
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main
          elif [ "$KSU_VARIANT" == "RKSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/susfs-rksu-master/kernel/setup.sh" | bash -s susfs-rksu-master
          elif [ "$KSU_VARIANT" == "KernelSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          else
            echo "KernelSU Disabled (KernelSU 已禁用)"
          fi

          echo "✅ KernelSU configuration complete (KernelSU 配置完成)"

      # ── DroidSpaces 内核补丁 ──
      - name: 🧰 Patch DroidSpaces kernel source (打 DroidSpaces 内核补丁)
        if: ${{ github.event.inputs.droidspaces_enable == 'enable' }}
        run: |
          cd "$KERNEL_SOURCE"

          echo "正在下载 DroidSpaces 内核补丁..."
          mkdir -p patches

          # 补丁 1：修复 xt_qtaguid 内核崩溃
          wget -q -O patches/fix_xt_qtaguid.patch \
            "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/master/Documentation/resources/kernel-patches/non-GKI/01.fix_kernel_panic_in_xt_qtaguid.patch"

          if patch -p1 -N < patches/fix_xt_qtaguid.patch; then
            echo "✅ xt_qtaguid 补丁应用成功"
          else
            echo "ℹ️ xt_qtaguid 补丁已存在或无需应用"
          fi

          # 补丁 2：修复 CGroup 文件前缀处理
          wget -q -O patches/fix_cgroup_prefix.patch \
            "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/master/Documentation/resources/kernel-patches/non-GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch"

          if patch -p1 -N < patches/fix_cgroup_prefix.patch; then
            echo "✅ CGroup 补丁应用成功"
          else
            echo "ℹ️ CGroup 补丁已存在或无需应用"
          fi

          echo "✅ DroidSpaces 补丁处理完成"

      - name: 🔨 Build the kernel (构建内核)
        timeout-minutes: 150
        run: |
          cd "$KERNEL_SOURCE"

          export PATH="$TOOLCHAIN_DIR/clang/bin:$PATH"

          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=$TOOLCHAIN_DIR/gcc/gcc64/bin/aarch64-linux-android- \
            CROSS_COMPILE_COMPAT=$TOOLCHAIN_DIR/gcc/gcc32/bin/arm-linux-androideabi- \
            CROSS_COMPILE_ARM32=$TOOLCHAIN_DIR/gcc/gcc32/bin/arm-linux-androideabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LD=ld.lld HOSTLD=ld.lld \
            KCFLAGS=-Wno-error \
            O=out"

          SYSTEM="${{ github.event.inputs.compiled_system }}"
          KSU="${{ github.event.inputs.kernelsu_variant }}"
          KPM="${{ github.event.inputs.kpm_enable }}"
          DROIDSPACES="${{ github.event.inputs.droidspaces_enable }}"
          VERSION="${{ github.event.inputs.kernel_version }}"

          # ── 生成设备配置 ──
          echo "🔧 Generating ${DEVICE} configuration... (正在生成 ${DEVICE} 的配置)"
          make $MAKE_ARGS -j$(nproc --all) ${DEVICE}_defconfig

          # ═══════════════════════════════════════════════════
          # munch_defconfig 配置说明（兼容性确认）：
          #   CONFIG_BUILD_ARM64_UNCOMPRESSED_KERNEL=y
          #   → 输出 Image（未压缩 ELF），不是 Image.gz-dtb
          #   CONFIG_BUILD_ARM64_DT_OVERLAY=y
          #   → 使用 DT overlay，DTB 由 bootloader 处理
          # ═══════════════════════════════════════════════════

          # ── 基本优化配置 ──
          echo "🔧 Applying basic optimized configurations... (应用基本优化配置)"
          scripts/config --file out/.config \
            -e KALLSYMS \
            -e KALLSYMS_ALL \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e KPROBE_EVENTS \
            -e TMPFS_XATTR=y \
            -e TMPFS_POSIX_ACL \
            -e IP_NF_TARGET_TTL \
            -e IP6_NF_TARGET_HL \
            -e IP6_NF_MATCH_HL \
            -e UCLAMP_TASK \
            -e ENERGY_MODEL \
            -e CPU_IDLE \
            -e CPU_IDLE_GOV_MENU \
            -e CPU_IDLE_GOV_TEO \
            -e ARM_PSCI_CPUIDLE \
            -e CPU_FREQ \
            -e CPU_FREQ_STAT \
            -e CPU_FREQ_TIMES \
            -e CPU_FREQ_GOV_POWERSAVE \
            -e CPU_FREQ_GOV_CONSERVATIVE \
            -e CPU_FREQ_GOV_USERSPACE \
            -e CPU_FREQ_GOV_ONDEMAND \
            -e ZRAM \
            -e ZSMALLOC \
            -e ZRAM_WRITEBACK \
            -e CRYPTO_LZ4 \
            -e CRYPTO_LZ4HC \
            -e CRYPTO_ZSTD \
            -e SWAP \
            -e ANDROID_SIMPLE_LMK

          # ── TCP 调度算法 ──
          scripts/config --file out/.config \
            -e TCP_CONG_ADVANCED \
            -e TCP_CONG_BBR \
            -e DEFAULT_BBR \
            -e TCP_CONG_CUBIC \
            -e TCP_CONG_WESTWOOD \
            -e TCP_CONG_HTCP \
            -e TCP_CONG_VENO \
            -e TCP_CONG_CDG \
            -e NET_SCHED \
            -e NET_SCH_FQ_CODEL \
            -e NET_SCH_FQ \
            -e NET_SCH_CAKE \
            -e NET_SCH_INGRESS \
            -e MQ_IOSCHED_DEADLINE \
            -e MQ_IOSCHED_KYBER \
            -e IOSCHED_BFQ \
            -e BFQ_GROUP_IOSCHED

          # ── 系统特定配置 ──
          if [ "$SYSTEM" == "MIUI" ]; then
              echo "🔧 Apply MIUI specific configurations... (应用 MIUI 特定配置)"
              scripts/config --file out/.config \
                  --set-str STATIC_USERMODEHELPER_PATH /system/bin/micd \
                  -e OVERLAY_FS \
                  -d DEBUG_FS \
                  -e MIGT \
                  -e MIHW \
                  -e PACKAGE_RUNTIME_INFO \
                  -e BINDER_OPT \
                  -e KPERFEVENTS \
                  -e MILLET \
                  -e XIAOMI_MIUI \
                  -e TASK_DELAY_ACCT \
                  -e MI_FRAGMENTION \
                  -e PERF_HELPER \
                  -e BOOTUP_RECLAIM \
                  -e MI_RECLAIM
          fi

          # ── KernelSU 配置 ──
          if [ "$KSU" == "SukiSU-Ultra" ] || [ "$KSU" == "RKSU" ]; then
              echo "🔧 Applying SukiSU-Ultra & RKSU Configuration... (应用 SukiSU-Ultra & RKSU 配置)"
              scripts/config --file out/.config \
                  -e KSU \
                  -e KSU_MANUAL_HOOK \
                  -e KSU_SUSFS \
                  -e KSU_SUSFS_HAS_MAGIC_MOUNT \
                  -e KSU_SUSFS_SUS_PATH \
                  -e KSU_SUSFS_SUS_MOUNT \
                  -e KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT \
                  -e KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
                  -e KSU_SUSFS_SUS_KSTAT \
                  -d KSU_SUSFS_SUS_OVERLAYFS \
                  -e KSU_SUSFS_TRY_UMOUNT \
                  -e KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT \
                  -e KSU_SUSFS_SPOOF_UNAME \
                  -e KSU_SUSFS_ENABLE_LOG \
                  -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
                  -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \
                  -e KSU_SUSFS_OPEN_REDIRECT \
                  -d KSU_SUSFS_SUS_SU
          elif [ "$KSU" == "KernelSU" ]; then
              echo "🔧 Applying KernelSU Configuration... (应用 KernelSU 配置)"
              scripts/config --file out/.config \
                  -e KSU
          fi

          # ── KPM 配置 ──
          if [ "$KSU" == "SukiSU-Ultra" ] && [ "$KPM" == "enable" ]; then
              echo "🔧 Enabling KPM Configuration... (开启 KPM 配置)"
              scripts/config --file out/.config \
                  -e KPM
              # 注意：munch_defconfig 已设置 CONFIG_BUILD_ARM64_UNCOMPRESSED_KERNEL=y
              # 输出本身就是 Image（未压缩），KPM 可直接修补，无需额外切换
          fi

          # ── Droidspaces / LXC / Docker 容器支持 ──
          if [ "$DROIDSPACES" == "enable" ]; then
              echo "🔧 Enabling Droidspaces / LXC / Docker support... (启用容器支持)"

              scripts/config --file out/.config \
                  -e NAMESPACES \
                  -e UTS_NS \
                  -e IPC_NS \
                  -e USER_NS \
                  -e PID_NS \
                  -e NET_NS \
                  -e CGROUP_DEVICE \
                  -e CGROUP_BPF \
                  -e CPUSETS \
                  -e CGROUP_SCHED \
                  -e CGROUP_PIDS \
                  -e CGROUP_FREEZER \
                  -e CGROUP_CPUACCT \
                  -e CGROUP_NET_PRIO \
                  -e CGROUP_HUGETLB \
                  -e DEVTMPFS \
                  -e DEVTMPFS_MOUNT \
                  -e SECCOMP \
                  -e SECCOMP_FILTER \
                  -e POSIX_MQUEUE \
                  -e SIGNALFD \
                  -e TIMERFD \
                  -e EVENTFD \
                  -e EPOLL \
                  -e FANOTIFY \
                  -e FANOTIFY_ACCESS_PERMISSIONS \
                  -e INOTIFY_USER \
                  -e CHECKPOINT_RESTORE \
                  -e MEMCG \
                  -e MEMCG_SWAP \
                  -e MEMCG_KMEM \
                  -e CGROUP_PERF \
                  -e VETH \
                  -e TUN \
                  -e BRIDGE \
                  -e BRIDGE_NETFILTER \
                  -e NETFILTER_XT_TARGET_CT \
                  -e NETFILTER_XT_TARGET_CHECKSUM \
                  -e NF_NAT \
                  -e NF_NAT_REDIRECT \
                  -e NETFILTER_XT_MATCH_ADDRTYPE \
                  -e NETFILTER_XT_MATCH_IPVS \
                  -e IP_NF_NAT \
                  -e IP6_NF_NAT \
                  -e IP_NF_TARGET_MASQUERADE \
                  -e IP6_NF_TARGET_MASQUERADE \
                  -e NETFILTER_XT_MATCH_COMMENT \
                  -e DEVPTS_MULTIPLE_INSTANCES \
                  -e SYSVIPC \
                  -e OVERLAY_FS

              # ── 4.19 内核补充选项（legacy netfilter，容器 NAT 必需）──
              scripts/config --file out/.config \
                  -e NF_CONNTRACK_IPV4 \
                  -e NF_NAT_IPV4

              # 必须禁用 — 否则容器内无法联网
              scripts/config --file out/.config \
                  -d ANDROID_PARANOID_NETWORK

              echo "✅ Droidspaces support configured (容器支持配置完成)"
          fi

          # ── 解析所有 config 依赖关系 ──
          echo "🔧 Resolving Kconfig dependencies... (解析内核配置依赖)"
          make $MAKE_ARGS olddefconfig

          # ── 自定义内核版本号 ──
          if [ ! -z "$VERSION" ]; then
              echo "🔧 设置自定义内核版本: $VERSION"

              main_version=$(echo "$VERSION" | grep -oE '^[0-9]+(\.[0-9]+)+')
              if [ ! -z "$main_version" ]; then
                IFS='.' read -ra version_parts <<< "$main_version"
                sed -i "2s/.*/VERSION = ${version_parts[0]}/" "$KERNEL_SOURCE/Makefile"
                if [ -n "${version_parts[1]}" ]; then
                  sed -i "3s/.*/PATCHLEVEL = ${version_parts[1]}/" "$KERNEL_SOURCE/Makefile"
                fi
                if [ -n "${version_parts[2]}" ]; then
                  sed -i "4s/.*/SUBLEVEL = ${version_parts[2]}/" "$KERNEL_SOURCE/Makefile"
                fi
              fi

              custom_part=$(echo "$VERSION" | grep -oE '(-[a-zA-Z0-9._-]+)+$' | head -1)
              if [ ! -z "$custom_part" ]; then
                sed -i "s/echo \"\$res\"/echo \"${custom_part}\"/g" "$KERNEL_SOURCE/scripts/setlocalversion"
              fi
          else
              echo "🔧 使用默认版本后缀: -Yun"
              sed -i "s/-dirty/-Yun/g" "$KERNEL_SOURCE/scripts/setlocalversion"
          fi

          # ═══════════════════════════════════════════════════
          # 注意：munch_defconfig 使用 CONFIG_BUILD_ARM64_UNCOMPRESSED_KERNEL=y
          # 输出的是未压缩的 Image，不是 Image.gz-dtb
          # 以下校验和打包均以 Image 为优先
          # ═══════════════════════════════════════════════════

          # ── 开始构建 ──
          echo "🚀 Start building the kernel... (开始构建内核)"
          make $MAKE_ARGS -j$(nproc --all) 2>&1 | tee build.log

          # ── 构建校验（优先 Image，回退其他格式）──
          BOOT_DIR="$KERNEL_SOURCE/out/arch/arm64/boot"
          if [ -f "$BOOT_DIR/Image" ]; then
              echo "✅ Kernel Build Successful (内核构建成功) — Image (uncompressed)"
              ls -lh "$BOOT_DIR/Image"
              echo "Image" > "$BOOT_DIR/.kernel_type"
          elif [ -f "$BOOT_DIR/Image.gz-dtb" ]; then
              echo "✅ Kernel Build Successful (内核构建成功) — Image.gz-dtb"
              ls -lh "$BOOT_DIR/Image.gz-dtb"
              echo "Image.gz-dtb" > "$BOOT_DIR/.kernel_type"
          elif [ -f "$BOOT_DIR/Image.gz" ]; then
              echo "✅ Kernel Build Successful (内核构建成功) — Image.gz"
              ls -lh "$BOOT_DIR/Image.gz"
              echo "Image.gz" > "$BOOT_DIR/.kernel_type"
          else
              echo "❌ Kernel build failure (内核构建失败) — 未找到内核镜像"
              echo "--- 构建日志最后 100 行 ---"
              tail -n 100 build.log
              echo "--- out/arch/arm64/boot/ 目录内容 ---"
              ls -la "$BOOT_DIR/" 2>/dev/null || echo "目录不存在"
              exit 1
          fi

          echo "📊 CCache Statistics (CCache 统计信息):"
          ccache --show-stats

      # ── KPM 修补 Image 文件 ──
      # munch_defconfig 输出 Image（未压缩），KPM 直接可用
      - name: 🛠️ KPM Patching Image Files (KPM 修补 Image 文件)
        run: |
          KSU_VARIANT="${{ github.event.inputs.kernelsu_variant }}"
          KPM_ENABLE="${{ github.event.inputs.kpm_enable }}"

          if [ "$KSU_VARIANT" == "SukiSU-Ultra" ] && [ "$KPM_ENABLE" == "enable" ]; then
            BOOT_DIR="$KERNEL_SOURCE/out/arch/arm64/boot"
            if [ -f "$BOOT_DIR/Image" ]; then
              echo "🛠️ 正在修补 Image 文件 (KPM)..."
              cd "$BOOT_DIR"
              curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/refs/heads/main/kpm/patch_linux" -o patch
              chmod 777 patch
              if ./patch; then
                rm -f Image
                mv oImage Image
                echo "✅ KPM patch applied (KPM 修补完成)"
              else
                echo "❌ KPM Patch Failed, Use Original Image (KPM 修补失败，使用原始 Image)"
              fi
            else
              echo "❌ Image not found — cannot apply KPM patch"
              ls -la "$BOOT_DIR/"
            fi
          else
            echo "ℹ️ KPM is not enabled or KernelSU variants do not support KPM."
          fi

      - name: 📝 Setting Version Variables (设置版本变量)
        run: |
          cd "$KERNEL_SOURCE"
          GIT_COMMIT_SHORT=$(git rev-parse --short=6 HEAD)
          echo "GIT_COMMIT_ID=$GIT_COMMIT_SHORT" >> $GITHUB_ENV
          BUILD_DATE=$(date +%Y%m%d)
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      # ── 打包 AnyKernel3（优先 Image）──
      - name: 📦 Package kernel to AnyKernel3 (打包内核到 AnyKernel3)
        run: |
          SYSTEM="${{ github.event.inputs.compiled_system }}"
          KSU="${{ github.event.inputs.kernelsu_variant }}"
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          BUILD_ID="${{ env.GIT_COMMIT_ID }}"
          BUILD_DATE="${{ env.BUILD_DATE }}"
          ZIP_NAME="${DEVICE}_${KSU}_${SYSTEM}_${BUILD_DATE}_${BUILD_ID}_${BUILD_TYPE}.zip"

          echo "📦 Create AnyKernel3 package (创建 AnyKernel3 刷机包)"

          mkdir -p "$WORKDIR/ak3_out"
          cd "$WORKDIR/ak3_out"
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1
          cd AnyKernel3

          rm -rf .git .github README.md

          # 复制内核镜像 — munch_defconfig 输出 Image（未压缩）
          BOOT_DIR="$KERNEL_SOURCE/out/arch/arm64/boot"
          if [ -f "$BOOT_DIR/Image" ]; then
            echo "复制 Image (未压缩，munch_defconfig 默认输出)"
            cp "$BOOT_DIR/Image" ./
          elif [ -f "$BOOT_DIR/Image.gz-dtb" ]; then
            echo "复制 Image.gz-dtb (内嵌 DTB)"
            cp "$BOOT_DIR/Image.gz-dtb" ./
          elif [ -f "$BOOT_DIR/Image.gz" ]; then
            echo "复制 Image.gz"
            cp "$BOOT_DIR/Image.gz" ./
          else
            echo "❌ 未找到内核镜像文件！"
            ls -la "$BOOT_DIR/"
            exit 1
          fi

          # 创建 munch 专用的 anykernel.sh
          cat > anykernel.sh << 'AKEOF'
# Redmi K40S / POCO F4 (munch) — AnyKernel3
kernel.string=Kernel for Redmi K40S (munch) / POCO F4
device.name1=munch
device.name2=munchin
device.name3=RedmiK40S
device.name4=POCOF4
block=/dev/block/bootdevice/by-name/boot
is_slot_device=auto
ramdisk_compression=gzip
AKEOF

          # 打包
          echo "📦 Flashing package being created (正在创建刷机包): $ZIP_NAME"
          zip -r "$ZIP_NAME" .

          if [ -f "$ZIP_NAME" ]; then
            echo "✅ Package created (刷机包创建成功): $ZIP_NAME"
            ls -lh "$ZIP_NAME"
            mv "$ZIP_NAME" ..
          else
            echo "❌ Package creation failed (刷机包创建失败)"
            exit 1
          fi

      - name: 📤 Upload compilation results (上传编译结果)
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ matrix.device }}
          path: ${{ github.workspace }}/ak3_out/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: 📥 Download all zip artifacts (下载所有 zip 构建产物)
      uses: actions/download-artifact@v4
      with:
        path: ${{ github.workspace }}/out

    - name: 📝 Preparing files for release (准备发布文件)
      run: |
        mkdir -p ${{ github.workspace }}/release
        cd ${{ github.workspace }}/out
        device_list=()
        for dir in */; do
          device_name=$(echo "$dir" | sed 's/Kernel-//' | sed 's/\/$//')
          echo "Found device: $device_name"
          device_list+=("$device_name")
          cd "$dir"
          for zip_file in *; do
            if [[ -f "$zip_file" && "$zip_file" == *.zip ]]; then
              mv "$zip_file" ${{ github.workspace }}/release/
            fi
          done
          cd ..
        done
        TARGET_DEVICES=$(echo "${device_list[*]}" | tr ' ' '-')
        echo "TARGET_DEVICES=$TARGET_DEVICES" >> $GITHUB_ENV

    - name: 📅 Setting date variables (设置日期变量)
      run: |
        echo "RELEASE_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
        REPO_URL="https://github.com/yspbwx2010/kernel_xiaomi_sm8250_mod.git"
        GIT_COMMIT_ID=$(git ls-remote $REPO_URL HEAD | cut -f1)
        echo "GIT_COMMIT_ID=$GIT_COMMIT_ID" >> $GITHUB_ENV

    - name: 📤 Post to Release (发布到 Release)
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.workspace }}/release/*.zip
        name: Kernel (${{ env.TARGET_DEVICES }}) ${{ github.event.inputs.kernelsu_variant }} ${{ github.event.inputs.compiled_system }} ${{ env.RELEASE_DATE }}
        tag_name: Kernel-${{ env.TARGET_DEVICES }}-${{ github.event.inputs.kernelsu_variant }}-${{ env.RELEASE_DATE }}
        body: |
          ## 📱 Kernel Build Information

          **English:**
          - Target Device: ${{ env.TARGET_DEVICES }}
          - Compiled System: ${{ github.event.inputs.compiled_system }}
          - KernelSU Variant: ${{ github.event.inputs.kernelsu_variant }}
          - KPM Support: ${{ github.event.inputs.kpm_enable }}
          - Droidspaces Support: ${{ github.event.inputs.droidspaces_enable }}
          - Build Type: ${{ github.event.inputs.build_type }}
          - Build Date: ${{ env.RELEASE_DATE }}
          - Commit ID: ${{ env.GIT_COMMIT_ID }}

          **中文:**
          - 目标机型: ${{ env.TARGET_DEVICES }}
          - 适用系统: ${{ github.event.inputs.compiled_system }}
          - KernelSU变体: ${{ github.event.inputs.kernelsu_variant }}
          - KPM支持: ${{ github.event.inputs.kpm_enable }}
          - Droidspaces支持: ${{ github.event.inputs.droidspaces_enable }}
          - 构建类型: ${{ github.event.inputs.build_type }}
          - 构建日期: ${{ env.RELEASE_DATE }}
          - 提交ID: ${{ env.GIT_COMMIT_ID }}

          **安装说明:**
          1. 下载对应机型的刷机包
          2. 进入 Recovery 模式
          3. 通过 Recovery 刷入刷机包
          4. 重启设备
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
