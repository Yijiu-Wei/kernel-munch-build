name: Build K40S - HyperOS 1 - Android 14 - Kernel 4.19.157

on:
  workflow_call:
  workflow_dispatch:

env:
  # Device env
  DEVICE_NAME : "Xiaomi Redmi K40S"
  DEVICE_CODENAME : "munch"

  CUSTOM_CMDS : "CLANG_TRIPLE=aarch64-linux-gnu-"
  EXTRA_CMDS : "LD=ld.lld LLVM=1 LLVM_IAS=1"

  # Kernel 4.19.157 for K40S (HyperOS 1 / Android 14)
  # HuberyBrook 的 sm8250_mod 内核，原生支持 munch，集成大量优化
  KERNEL_SOURCE : "https://github.com/HuberyBrook/kernel_xiaomi_sm8250_mod.git"
  KERNEL_BRANCH : "android14-lineage22-mod"

  CLANG_SOURCE : "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/LLVM-19.1.7-Linux-X64.tar.xz"
  CLANG_BRANCH : ""

  GCC_GNU : false
  GCC_64_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git"
  GCC_64_BRANCH : "android12L-release"
  GCC_32_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git"
  GCC_32_BRANCH : "android12L-release"

  DEFCONFIG_SOURCE: ""
  DEFCONFIG_NAME : "munch_defconfig"
  DEFCONFIG_ORIGIN_IMAGE: ""
  DEFCONFIG_FROM_BOOT: false

  # ──────────────────────────────────────────────
  # SukiSU-Ultra (Root 方案)
  # ──────────────────────────────────────────────
  KERNELSU_SOURCE : ""
  KERNELSU_BRANCH : ""

  KERNELSU_AUTO_GET : "true"
  KERNELSU_AUTO_FORK : "sukisu"        # 使用 SukiSU-Ultra 分支

  # ──────────────────────────────────────────────
  # SUSFS (Root 隐藏)
  # ──────────────────────────────────────────────
  SUSFS_ENABLE : true
  SUSFS_FIXED : false

  AK3_SOURCE : "https://github.com/osm0sis/AnyKernel3.git"
  AK3_BRANCH : "master"

  BOOT_SOURCE : ""

  NEED_DTBO : false
  NEED_SAFE_DTBO : false

  ROM_TEXT : "HyperOS1.0"

  # Other env
  PYTHON_VERSION: "3"

  PACK_METHOD: "Anykernel3"
  PACK_KMODULES: "false"

  KERNELSU_METHOD: "shell"

  PATCHES_SOURCE: ""
  PATCHES_BRANCH: ""

  SUSFS_FOLDER_FIXED: ""
  SUSFS_PATCH_FIXED: ""

  REKERNEL_ENABLE: "false"

  # ──────────────────────────────────────────────
  # Droidspaces (LXC/Docker 容器支持)
  # ──────────────────────────────────────────────
  DROIDSPACES_ENABLE: "true"

  HOOK_METHOD: "syscall"

  KERNEL_PATCH: "false"                 # 4.19 > 4.9，无需 kernel_read/write 补丁

  # ──────────────────────────────────────────────
  # KPM — SukiSU-Ultra 内联 KPM 补丁
  # ──────────────────────────────────────────────
  KPM_ENABLE: "true"
  KPM_INLINE: "true"                    # SukiSU-Ultra 使用内联 KPM
  KPM_KPATCH_NEXT: "false"
  KPM_PATCH_SOURCE: "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU_patch/refs/heads/main/kpm/patch_linux"

  BASEBAND_GUARD_ENABLE: "false"
  BASEBAND_GUARD_BOOT: "false"

  GENERATE_DTB: "false"
  GENERATE_CHIP: "qcom"

  BUILD_DEBUGGER: "false"
  SKIP_PATCH: "false"

  BUILD_OTHER_CONFIG: "false"
  MERGE_CONFIG_FILES: "vendor/debugfs.config,vendor/lahaina_QGKI.config"

  FREE_MORE_SPACE: "false"

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: ⏰ Checkout repository
        uses: actions/checkout@v6

      - name: ⌛️ Compilation environment preparation
        uses: ./.github/workflows/build-env

      - name: ⚙️ Get neccssary tools
        uses: ./.github/workflows/build-ready

      - name: 🪝 Patch Kernel of SUSFS
        uses: ./.github/workflows/patch-susfs

      - name: 🔗 Patch for no-kprobe
        uses: ./.github/workflows/patch-no-kprobe

      - name: 🪛 Extra Kernel Options
        run: |
          # Only ${{ env.DEVICE_NAME }} (munch) use it.
          cd $GITHUB_WORKSPACE/device_kernel
          # 可在此添加内核 defconfig 附加选项，例如:
          # echo "CONFIG_XXX=y" >> arch/arm64/configs/${{ env.DEFCONFIG_NAME }}

      - name: 🧰 Patch Kernel of Re:Kernel
        uses: ./.github/workflows/patch-rekernel

      - name: 💿 Patch Kernel of Droidspaces
        uses: ./.github/workflows/patch-droidspaces

      - name: 🔒 Patch Kernel of Baseband Guard
        uses: ./.github/workflows/patch-baseband-guard

      - name: 🚀 Build Process
        uses: ./.github/workflows/build-process

      - name: 🔩 Pack Process
        uses: ./.github/workflows/pack-process

      - name: ✏️ Upload Artifacts
        uses: ./.github/workflows/upload-files
